# AnyCrawl - Coolify v4 Template
# Pre-built images from: https://github.com/any4ai/AnyCrawl
#
# Deploy via Coolify:
#   New Resource → Docker Compose → paste raw URL of this file
#
# Images:
#   API:               ghcr.io/any4ai/anycrawl-api         (amd64 + arm64)
#   Scrape Playwright: ghcr.io/any4ai/anycrawl-scrape-playwright (amd64 + arm64)
#   Scrape Cheerio:    ghcr.io/any4ai/anycrawl-scrape-cheerio    (amd64 + arm64)
#   Scrape Puppeteer:  ghcr.io/any4ai/anycrawl-scrape-puppeteer  (amd64 only)

services:
    # Init container: applies missing SQLite schema changes on existing deployments
    # Runs before the API starts and exits when done
    init-db:
        image: alpine:3.19
        restart: "no"
        command: >
            sh -c "
              apk add --no-cache sqlite >/dev/null 2>&1 &&
              DB=/usr/src/app/db/database.db &&
              echo 'Waiting for DB...' &&
              WAIT=0 && while [ ! -f \"$$DB\" ] && [ $$WAIT -lt 90 ]; do sleep 3; WAIT=$$((WAIT+3)); done &&
              if [ ! -f \"$$DB\" ]; then echo 'DB not found after 90s, skipping patch'; exit 0; fi &&
              sleep 2 &&
              echo 'Patching SQLite schema...' &&
              sqlite3 $$DB 'ALTER TABLE jobs ADD COLUMN user_id TEXT;' 2>/dev/null || true &&
              sqlite3 $$DB 'ALTER TABLE jobs ADD COLUMN deducted_at INTEGER;' 2>/dev/null || true &&
              sqlite3 $$DB 'ALTER TABLE request_log ADD COLUMN user_id TEXT;' 2>/dev/null || true &&
              sqlite3 $$DB 'ALTER TABLE template_executions ADD COLUMN user_id TEXT;' 2>/dev/null || true &&
              sqlite3 $$DB '
                CREATE TABLE IF NOT EXISTS scheduled_tasks (
                  uuid TEXT PRIMARY KEY NOT NULL,
                  api_key_id TEXT REFERENCES api_key(uuid),
                  user_id TEXT,
                  name TEXT NOT NULL,
                  description TEXT,
                  task_type TEXT NOT NULL,
                  task_payload TEXT NOT NULL,
                  cron_expression TEXT NOT NULL,
                  timezone TEXT NOT NULL DEFAULT ''UTC'',
                  concurrency_mode TEXT NOT NULL DEFAULT ''skip'',
                  max_executions_per_day INTEGER,
                  min_credits_required INTEGER NOT NULL DEFAULT 1,
                  is_active INTEGER NOT NULL DEFAULT 1,
                  is_paused INTEGER NOT NULL DEFAULT 0,
                  pause_reason TEXT,
                  last_execution_at INTEGER,
                  next_execution_at INTEGER,
                  total_executions INTEGER NOT NULL DEFAULT 0,
                  successful_executions INTEGER NOT NULL DEFAULT 0,
                  failed_executions INTEGER NOT NULL DEFAULT 0,
                  consecutive_failures INTEGER NOT NULL DEFAULT 0,
                  tags TEXT,
                  metadata TEXT,
                  created_at INTEGER NOT NULL,
                  updated_at INTEGER NOT NULL
                );
              ' 2>/dev/null || true &&
              sqlite3 $$DB '
                CREATE TABLE IF NOT EXISTS task_executions (
                  uuid TEXT PRIMARY KEY NOT NULL,
                  scheduled_task_uuid TEXT NOT NULL REFERENCES scheduled_tasks(uuid) ON DELETE CASCADE,
                  execution_number INTEGER NOT NULL,
                  idempotency_key TEXT NOT NULL UNIQUE,
                  status TEXT NOT NULL DEFAULT ''pending'',
                  started_at INTEGER,
                  completed_at INTEGER,
                  job_uuid TEXT REFERENCES jobs(uuid),
                  error_message TEXT,
                  error_code TEXT,
                  error_details TEXT,
                  triggered_by TEXT NOT NULL DEFAULT ''scheduler'',
                  scheduled_for INTEGER NOT NULL,
                  metadata TEXT,
                  created_at INTEGER NOT NULL
                );
              ' 2>/dev/null || true &&
              sqlite3 $$DB '
                CREATE TABLE IF NOT EXISTS webhook_subscriptions (
                  uuid TEXT PRIMARY KEY NOT NULL,
                  api_key_id TEXT REFERENCES api_key(uuid),
                  user_id TEXT,
                  name TEXT NOT NULL,
                  description TEXT,
                  webhook_url TEXT NOT NULL,
                  webhook_secret TEXT NOT NULL,
                  scope TEXT NOT NULL DEFAULT ''all'',
                  specific_task_ids TEXT,
                  event_types TEXT NOT NULL,
                  custom_headers TEXT,
                  timeout_seconds INTEGER NOT NULL DEFAULT 10,
                  max_retries INTEGER NOT NULL DEFAULT 3,
                  retry_backoff_multiplier REAL NOT NULL DEFAULT 2,
                  is_active INTEGER NOT NULL DEFAULT 1,
                  consecutive_failures INTEGER NOT NULL DEFAULT 0,
                  auto_disable_after_failures INTEGER NOT NULL DEFAULT 10,
                  last_success_at INTEGER,
                  last_failure_at INTEGER,
                  total_deliveries INTEGER NOT NULL DEFAULT 0,
                  successful_deliveries INTEGER NOT NULL DEFAULT 0,
                  failed_deliveries INTEGER NOT NULL DEFAULT 0,
                  tags TEXT,
                  metadata TEXT,
                  created_at INTEGER NOT NULL,
                  updated_at INTEGER NOT NULL
                );
              ' 2>/dev/null || true &&
              sqlite3 $$DB '
                CREATE TABLE IF NOT EXISTS webhook_deliveries (
                  uuid TEXT PRIMARY KEY NOT NULL,
                  webhook_subscription_uuid TEXT NOT NULL REFERENCES webhook_subscriptions(uuid) ON DELETE CASCADE,
                  event_type TEXT NOT NULL,
                  event_source TEXT NOT NULL,
                  event_source_id TEXT NOT NULL,
                  status TEXT NOT NULL DEFAULT ''pending'',
                  attempt_number INTEGER NOT NULL DEFAULT 1,
                  max_attempts INTEGER NOT NULL DEFAULT 3,
                  request_url TEXT NOT NULL,
                  request_method TEXT NOT NULL DEFAULT ''POST'',
                  request_headers TEXT,
                  request_body TEXT,
                  response_status INTEGER,
                  response_headers TEXT,
                  response_body TEXT,
                  response_duration_ms INTEGER,
                  error_message TEXT,
                  error_code TEXT,
                  next_retry_at INTEGER,
                  created_at INTEGER NOT NULL,
                  delivered_at INTEGER
                );
              ' 2>/dev/null || true &&
              echo 'Schema patch done.'
            "
        volumes:
            - db:/usr/src/app/db

    api:
        image: ghcr.io/any4ai/anycrawl-api:${ANYCRAWL_VERSION:-latest}
        environment:
            SERVICE_FQDN_API_8080: 
            NODE_ENV: production
            ANYCRAWL_API_PORT: "8080"
            ANYCRAWL_REDIS_URL: redis://redis:6379
            ANYCRAWL_API_DB_TYPE: sqlite
            ANYCRAWL_API_DB_CONNECTION: /usr/src/app/db/database.db

            # Auth
            ANYCRAWL_API_AUTH_ENABLED: ${ANYCRAWL_API_AUTH_ENABLED:-false}
            ANYCRAWL_API_CREDITS_ENABLED: ${ANYCRAWL_API_CREDITS_ENABLED:-false}

            # Browser / scraping
            ANYCRAWL_HEADLESS: ${ANYCRAWL_HEADLESS:-true}
            ANYCRAWL_IGNORE_SSL_ERROR: ${ANYCRAWL_IGNORE_SSL_ERROR:-true}
            ANYCRAWL_PROXY_URL: ${ANYCRAWL_PROXY_URL:-}
            ANYCRAWL_PROXY_STEALTH_URL: ${ANYCRAWL_PROXY_STEALTH_URL:-}
            ANYCRAWL_AVAILABLE_ENGINES: ${ANYCRAWL_AVAILABLE_ENGINES:-playwright,cheerio,puppeteer}

            # Concurrency
            ANYCRAWL_MAX_CONCURRENCY: ${ANYCRAWL_MAX_CONCURRENCY:-50}
            ANYCRAWL_MIN_CONCURRENCY: ${ANYCRAWL_MIN_CONCURRENCY:-5}

            # Caching
            ANYCRAWL_CACHE_ENABLED: ${ANYCRAWL_CACHE_ENABLED:-true}
            ANYCRAWL_CACHE_DEFAULT_MAX_AGE: ${ANYCRAWL_CACHE_DEFAULT_MAX_AGE:-172800000}
            ANYCRAWL_CACHE_SITEMAP_MAX_AGE: ${ANYCRAWL_CACHE_SITEMAP_MAX_AGE:-604800000}

            # Storage (local by default; set to "s3" to enable S3)
            ANYCRAWL_STORAGE: ${ANYCRAWL_STORAGE:-}
            ANYCRAWL_S3_BUCKET: ${ANYCRAWL_S3_BUCKET:-}
            ANYCRAWL_S3_REGION: ${ANYCRAWL_S3_REGION:-us-east-1}
            ANYCRAWL_S3_ENDPOINT: ${ANYCRAWL_S3_ENDPOINT:-}
            ANYCRAWL_S3_ACCESS_KEY: ${ANYCRAWL_S3_ACCESS_KEY:-}
            ANYCRAWL_S3_SECRET_ACCESS_KEY: ${ANYCRAWL_S3_SECRET_ACCESS_KEY:-}


            # AI / LLM (optional)
            DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-}
            DEFAULT_EXTRACT_MODEL: ${DEFAULT_EXTRACT_MODEL:-}
            DEFAULT_EMBEDDING_MODEL: ${DEFAULT_EMBEDDING_MODEL:-}
            OPENAI_API_KEY: ${OPENAI_API_KEY:-}
            OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
            CUSTOM_BASE_URL: ${CUSTOM_BASE_URL:-}
            CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}

            # OCR (optional)
            ANYCRAWL_VL_REC_SERVER_URL: ${ANYCRAWL_VL_REC_SERVER_URL:-}
            ANYCRAWL_VL_REC_API_KEY: ${ANYCRAWL_VL_REC_API_KEY:-}
            ANYCRAWL_VL_REC_MODEL: ${ANYCRAWL_VL_REC_MODEL:-PaddlePaddle/PaddleOCR-VL-1.5}

            # Search
            ANYCRAWL_SEARCH_ENABLED_ENGINES: ${ANYCRAWL_SEARCH_ENABLED_ENGINES:-ac-engine}
            ANYCRAWL_AC_ENGINE_URL: ${ANYCRAWL_AC_ENGINE_URL:-}
            ANYCRAWL_SEARXNG_URL: ${ANYCRAWL_SEARXNG_URL:-}

            # Scheduler / Webhooks
            ANYCRAWL_SCHEDULER_ENABLED: ${ANYCRAWL_SCHEDULER_ENABLED:-true}
            ANYCRAWL_WEBHOOKS_ENABLED: ${ANYCRAWL_WEBHOOKS_ENABLED:-true}
            ALLOW_LOCAL_WEBHOOKS: ${ALLOW_LOCAL_WEBHOOKS:-false}

            # Domain (set by Coolify automatically)
            ANYCRAWL_DOMAIN: ${SERVICE_FQDN_API}
        volumes:
            - storage:/usr/src/app/storage
            - db:/usr/src/app/db
        depends_on:
            redis:
                condition: service_healthy

    scrape-playwright:
        image: ghcr.io/any4ai/anycrawl-scrape-playwright:${ANYCRAWL_VERSION:-latest}
        environment:
            NODE_ENV: production
            ANYCRAWL_REDIS_URL: redis://redis:6379
            ANYCRAWL_HEADLESS: ${ANYCRAWL_HEADLESS:-true}
            ANYCRAWL_IGNORE_SSL_ERROR: ${ANYCRAWL_IGNORE_SSL_ERROR:-true}
            ANYCRAWL_PROXY_URL: ${ANYCRAWL_PROXY_URL:-}
            ANYCRAWL_AVAILABLE_ENGINES: playwright
        volumes:
            - storage:/usr/src/app/storage
            - db:/usr/src/app/db
        depends_on:
            redis:
                condition: service_healthy

    scrape-cheerio:
        image: ghcr.io/any4ai/anycrawl-scrape-cheerio:${ANYCRAWL_VERSION:-latest}
        environment:
            NODE_ENV: production
            ANYCRAWL_REDIS_URL: redis://redis:6379
            ANYCRAWL_HEADLESS: ${ANYCRAWL_HEADLESS:-true}
            ANYCRAWL_IGNORE_SSL_ERROR: ${ANYCRAWL_IGNORE_SSL_ERROR:-true}
            ANYCRAWL_PROXY_URL: ${ANYCRAWL_PROXY_URL:-}
            ANYCRAWL_AVAILABLE_ENGINES: cheerio
        volumes:
            - storage:/usr/src/app/storage
            - db:/usr/src/app/db
        depends_on:
            redis:
                condition: service_healthy

    # Puppeteer: amd64 only — remove this service on arm64 hosts
    scrape-puppeteer:
        image: ghcr.io/any4ai/anycrawl-scrape-puppeteer:${ANYCRAWL_VERSION:-latest}
        user: root
        environment:
            NODE_ENV: production
            ANYCRAWL_REDIS_URL: redis://redis:6379
            ANYCRAWL_HEADLESS: ${ANYCRAWL_HEADLESS:-true}
            ANYCRAWL_IGNORE_SSL_ERROR: ${ANYCRAWL_IGNORE_SSL_ERROR:-true}
            ANYCRAWL_PROXY_URL: ${ANYCRAWL_PROXY_URL:-}
            ANYCRAWL_AVAILABLE_ENGINES: puppeteer
        volumes:
            - storage:/usr/src/app/storage
            - db:/usr/src/app/db
        depends_on:
            redis:
                condition: service_healthy

    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    storage:
    db:
    redis-data:
